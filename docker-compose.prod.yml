x-judge0-environment: &judge0-environment
  REDIS_HOST: judge0-redis
  REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD:?Set JUDGE0_REDIS_PASSWORD in .env}
  POSTGRES_HOST: judge0-db
  POSTGRES_DB: judge0
  POSTGRES_USER: judge0
  POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD:?Set JUDGE0_POSTGRES_PASSWORD in .env}
  ENABLE_WAIT_RESULT: "true"
  ENABLE_NETWORK: "false"
  ALLOW_ENABLE_NETWORK: "false"
  MAX_MEMORY_LIMIT: ${JUDGE0_MAX_MEMORY_LIMIT:-524288}

services:
  judge-app:
    build: .
    container_name: judge-app-prod
    ports:
      - "80:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MAX_OUTPUT_BYTES: 1048576
      JUDGE0_URL: http://judge0-server:2358
      JUDGE0_PER_PROCESS_LIMITS: ${JUDGE0_PER_PROCESS_LIMITS:-false}
      JUDGE0_TESTCASE_CONCURRENCY: ${JUDGE0_TESTCASE_CONCURRENCY:-4}
      JUDGE0_USE_BATCH: ${JUDGE0_USE_BATCH:-true}
      JUDGE0_BATCH_SIZE: ${JUDGE0_BATCH_SIZE:-20}
      JUDGE0_COMPILATION_RETRY_COUNT: ${JUDGE0_COMPILATION_RETRY_COUNT:-2}
      JUDGE_MAX_RESPONSE_FIELD_BYTES: ${JUDGE_MAX_RESPONSE_FIELD_BYTES:-16384}
    depends_on:
      judge0-server:
        condition: service_started
    networks: [app-public, judge-internal]

  judge0-server:
    image: ${JUDGE0_IMAGE:-judge0/judge0:latest}
    privileged: true
    restart: unless-stopped
    environment: *judge0-environment
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    networks: [judge-internal]

  judge0-worker:
    image: ${JUDGE0_IMAGE:-judge0/judge0:latest}
    command: ["./scripts/workers"]
    privileged: true
    restart: unless-stopped
    environment:
      <<: *judge0-environment
      COUNT: ${JUDGE0_WORKER_COUNT:-8}
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    networks: [judge-internal]

  judge0-db:
    image: postgres:16.2
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD:?Set JUDGE0_POSTGRES_PASSWORD in .env}
    volumes:
      - judge0-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [judge-internal]

  judge0-redis:
    image: redis:7.2.4
    restart: unless-stopped
    command: ["sh", "-c", "exec redis-server --appendonly no --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD:?Set JUDGE0_REDIS_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [judge-internal]

volumes:
  judge0-data:

networks:
  app-public:
  judge-internal:
    internal: true
