services:
  judge-app:
    build: .
    container_name: judge-app
    ports:
      - "8080:8080"
      - "3000:3000"
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
      - ./client:/app/client
      - /app/client/node_modules
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MAX_OUTPUT_BYTES=1048576
      - CHOKIDAR_USEPOLLING=true
      - JUDGE0_URL=http://judge0-server:2358
      - JUDGE0_WAIT_ON_START=true
      - JUDGE0_PER_PROCESS_LIMITS=true
      - JUDGE0_COMPILE_ONCE=true
      - JUDGE0_COMPILE_ONCE_LANGUAGES=c,cpp,pascal,csharp,python
      - JUDGE0_REQUEST_TIMEOUT_MS=660000
      - JUDGE0_MAX_TESTCASES=500
    depends_on:
      judge0-server:
        condition: service_started
    command: >
      sh -c "cd /app/server && npm install && npm run dev &
      cd /app/client && npm install && npm run dev"

  judge0-server:
    image: judge0/judge0:latest
    privileged: true
    restart: unless-stopped
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: devpassword
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: devpassword
      MAX_CPU_TIME_LIMIT: 300
      MAX_WALL_TIME_LIMIT: 600
      MAX_MEMORY_LIMIT: 524288
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    privileged: true
    restart: unless-stopped
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: devpassword
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: devpassword
      MAX_CPU_TIME_LIMIT: 300
      MAX_WALL_TIME_LIMIT: 600
      MAX_MEMORY_LIMIT: 524288
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-db:
    image: postgres:16.2
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: devpassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 5s
      timeout: 5s
      retries: 10

  judge0-redis:
    image: redis:7.2.4
    restart: unless-stopped
    command: ["sh", "-c", "exec redis-server --appendonly no --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: devpassword
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
